name: Test and deploy Pages

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm test
      - run: python -m pip install -e ".[dev,observability]"
      - run: pytest
      - run: python scripts/evaluate_release.py
      - run: python scripts/langsmith_release.py check
      - run: python -m playwright install --with-deps chromium
      - name: Browser QA
        run: |
          python -m http.server 4175 --directory docs &
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:4175/ >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 20 ]; then
              echo "Preview server did not become ready"
              exit 1
            fi
            sleep 1
          done
          python scripts/browser_qa.py
      - name: Retain browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-qa
          path: artifacts/browser-qa

  deploy:
    if: github.event_name != 'pull_request'
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
